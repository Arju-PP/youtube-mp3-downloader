<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube to MP3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a1a;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    h1 { margin-bottom: 2rem; font-size: 2rem; }
    input {
      width: 100%;
      max-width: 400px;
      padding: 12px 16px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      margin-bottom: 1rem;
    }
    button {
      background: #ff0000;
      color: #fff;
      border: none;
      padding: 12px 32px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    button:hover { background: #cc0000; }
    .info {
      margin-top: 2rem;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>YouTube to MP3</h1>
    <input type="text" id="url" placeholder="Paste YouTube link here...">
    <br>
    <button onclick="download()">Download</button>
    <p class="info">First run the Python app, then click Download</p>
  </div>
  <script>
    function download() {
      const url = document.getElementById('url').value;
      if (!url) return alert('Please enter a YouTube link');
      window.location.href = 'ytmp3://' + encodeURIComponent(url);
    }
  </script>
</body>
</html>
